<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sol Executor - Beta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">SOL EXECUTOR <span class="version-tag">v2.0.0 BETA</span></div>
        <div class="dev-info">Dev: AreDev | gn375294@gmail.com</div>
    </header>

    <nav class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('executor')">EXECUTOR</button>
        <button class="tab-btn"        onclick="switchTab('console')">CONSOLE</button>
        <!-- id do terminal é "terminal" — alinhado com switchTab('terminal') no script.js -->
        <button class="tab-btn"        onclick="switchTab('terminal')">SOLTUX</button>
    </nav>

    <main class="main-content">

        <!-- ── EXECUTOR ─────────────────────────────────────────── -->
        <div id="executor" class="content active">
            <div class="editor-wrapper">
                <!-- Numeração de linhas -->
                <div id="line-numbers" aria-hidden="true"></div>
                <!-- Área de código -->
                <div id="code-editor"
                     contenteditable="true"
                     spellcheck="false"
                     autocorrect="off"
                     autocapitalize="off"
                     data-placeholder="-- Escreva seu script SOL aqui..."></div>
            </div>
        </div>

        <!-- ── CONSOLE ──────────────────────────────────────────── -->
        <div id="console" class="content">
            <div id="log-output"></div>
        </div>

        <!-- ── SOLTUX (terminal) ────────────────────────────────── -->
        <!-- id="terminal" para corresponder ao switchTab('terminal') do motor -->
        <div id="terminal" class="content">
            <div id="soltux-display"></div>
            <div class="terminal-input-row">
                <span class="terminal-prompt">E:\&gt;</span>
                <input type="text"
                       id="soltux-input"
                       placeholder="Digite um comando... (/help)"
                       autocomplete="off"
                       spellcheck="false">
            </div>
        </div>

    </main>

    <!-- ── BARRA DE AÇÕES (fora do scroll, sempre visível) ─────── -->
    <footer class="editor-footer">
        <button class="action-btn green"  onclick="runSol()">▶ RUN</button>
        <button class="action-btn red"    onclick="stopExecution()">■ STOP</button>
        <button class="action-btn"        onclick="document.getElementById('file-input').click()">IMPORT</button>
        <button class="action-btn"        onclick="exportProject()">EXPORT</button>
        <button class="action-btn danger" onclick="clearEditor()">CLEAR</button>
        <input type="file" id="file-input" style="display:none" accept=".sol,.txt" onchange="handleFile(this)">
    </footer>

    <!-- JSZip para exportProject() -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
